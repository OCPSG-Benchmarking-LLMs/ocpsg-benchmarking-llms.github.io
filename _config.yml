theme: jekyll-theme-chirpy

lang: en
timezone: Europe/Amsterdam

title: OCPSG Benchmarking LLMs
tagline: Multilingual policy agenda annotation benchmarks
description: >-
  Research infrastructure and documentation for benchmarking LLMs and fine-tuned
  models on multilingual parliamentary policy agenda annotation at the Oxford
  Computational Political Science Group.

url: "https://ocpsg-benchmarking-llms.github.io"
baseurl: ""

github:
  username: OCPSG-Benchmarking-LLMs

social:
  name: OCPSG Benchmarking LLMs
  email: ocpsg@politics.ox.ac.uk
  links:
    - https://github.com/OCPSG-Benchmarking-LLMs
    - https://www.linkedin.com/company/oxford-computational-political-science-group/

theme_mode: light

avatar: "/assets/img/favicons/android-chrome-192x192.png"
social_preview_image: "/assets/img/favicons/android-chrome-512x512.png"

## toc: true

pwa:
  enabled: true
  cache:
    enabled: true

paginate: 10

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"